  <text x="660" y="598" text-anchor="middle" class="tiny">rule-only / embedding 开关</text>
  <text x="880" y="578" text-anchor="middle" class="label">RetrievalQueryService</text>
  <text x="880" y="598" text-anchor="middle" class="tiny">provider → rerank → builder</text>
  <text x="770" y="658" text-anchor="middle" class="label">RetrievalContextBuilder + Context Views</text>
  <text x="770" y="679" text-anchor="middle" class="tiny">hardConstraints · priorityContext · riskReminders · recentChanges</text>
  <text x="660" y="748" text-anchor="middle" class="label">Prompts</text>
  <text x="660" y="765" text-anchor="middle" class="tiny">plan / draft / review / repair / approve</text>
  <text x="880" y="748" text-anchor="middle" class="label">可选实验</text>
  <text x="880" y="765" text-anchor="middle" class="tiny">embedding candidate + heuristic rerank</text>

  <rect x="1050" y="468" width="160" height="28" rx="14" class="accent"/>
  <text x="1130" y="488" text-anchor="middle" class="label" fill="#ffffff">Infrastructure</text>
  <text x="1050" y="528" class="layer-title">基础设施层</text>

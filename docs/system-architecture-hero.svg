  <path d="M568 184 H604" class="line"/>
  <path d="M784 184 H820" class="line"/>
  <text x="194" y="177" text-anchor="middle" class="card-title">入口</text>
  <text x="194" y="198" text-anchor="middle" class="code">src/index.ts</text>
  <text x="444" y="177" text-anchor="middle" class="card-title">CLI 注册</text>
  <text x="444" y="198" text-anchor="middle" class="code">src/cli/index.ts</text>
  <text x="694" y="177" text-anchor="middle" class="card-title">命令 action</text>
  <text x="694" y="198" text-anchor="middle" class="body">资源 / workflow / db</text>
  <text x="978" y="177" text-anchor="middle" class="card-title">统一运行时</text>
  <text x="978" y="198" text-anchor="middle" class="code">runCliCommand</text>
  <text x="978" y="215" text-anchor="middle" class="tiny">日志 · 错误处理 · exitCode</text>

  <path d="M300 244 V286" class="soft-line"/>
  <path d="M800 244 V286" class="soft-line"/>
  <path d="M1300 244 V286" class="soft-line"/>

  <g filter="url(#shadow)">
    <rect x="80" y="292" width="450" height="116" rx="26" class="card"/>
    <rect x="575" y="292" width="450" height="116" rx="26" class="card"/>
    <rect x="1070" y="292" width="450" height="116" rx="26" class="card"/>
  </g>

  <text x="112" y="330" class="card-title">资源命令</text>
  <text x="112" y="355" class="body">book · outline · world · character · faction</text>
  <text x="112" y="378" class="body">relation · item · hook · chapter</text>
  <text x="112" y="398" class="tiny">经由 Domain Services / ChapterService 进入数据与 Markdown 边界</text>

  <text x="607" y="330" class="card-title">工作流命令</text>
  <text x="607" y="355" class="body">plan → draft → review → repair → approve</text>
  <text x="607" y="378" class="tiny">版本化章节生产线 + pointer 校验 + 事务提交</text>
  <rect x="607" y="388" width="240" height="18" rx="9" class="pill-green"/>
  <text x="727" y="401" text-anchor="middle" class="tiny">retrievedContext 作为全流程共享事实基线</text>

  <text x="1102" y="330" class="card-title">数据库命令</text>
  <text x="1102" y="355" class="body">db init · db check</text>
  <text x="1102" y="378" class="tiny">启动 / 校验底层数据库能力，不承载业务编排</text>

  <g filter="url(#shadow)">
    <rect x="80" y="446" width="430" height="346" rx="30" class="layer"/>
    <rect x="540" y="446" width="460" height="346" rx="30" class="layer"/>
    <rect x="1030" y="446" width="490" height="346" rx="30" class="layer"/>
  </g>

  <rect x="100" y="468" width="182" height="28" rx="14" class="accent"/>
  <text x="191" y="488" text-anchor="middle" class="label" fill="#ffffff">Workflow Orchestration</text>
  <text x="100" y="528" class="layer-title">章节工作流层</text>
  <rect x="100" y="548" width="390" height="36" rx="16" class="pill"/>
  <rect x="100" y="596" width="390" height="36" rx="16" class="pill"/>
  <rect x="100" y="644" width="390" height="36" rx="16" class="pill"/>
  <rect x="100" y="692" width="390" height="36" rx="16" class="pill"/>
  <rect x="100" y="740" width="390" height="36" rx="16" class="pill"/>

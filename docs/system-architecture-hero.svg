<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">myai-novel 系统架构图</title>
  <desc id="desc">展示本地优先 CLI 写作系统的入口链、命令族、工作流层、planning retrieval context 层、基础设施层、外部适配器与数据层。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e8eef7" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#94a3b8" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .layer-title { font: 700 19px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .card-title { font: 700 18px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .label { font: 600 14px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .body { font: 500 13px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .tiny { font: 600 12px 'Avenir Next', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #64748b; }
      .code { font: 700 12px 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #1d4ed8; }
      .pill { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.2; }
      .pill-green { fill: #ecfeff; stroke: #99f6e4; stroke-width: 1.2; }
      .pill-amber { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; }
      .card { fill: #ffffff; stroke: #dbe7f3; stroke-width: 1.2; }
      .layer { fill: rgba(255,255,255,0.78); stroke: #dbe7f3; stroke-width: 1.3; }
      .accent { fill: url(#accent); }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #cbd5e1; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1600" height="1020" fill="url(#bg)"/>
  <rect width="1600" height="1020" fill="url(#grid)" opacity="0.75"/>

  <text x="80" y="72" class="title">myai-novel 系统架构</text>
  <text x="80" y="102" class="subtitle">本地优先 CLI 写作系统 · 入口链、章节工作流、retrieval 闭环与版本化数据层</text>
  <rect x="1272" y="48" width="248" height="44" rx="22" class="pill-green"/>
  <text x="1396" y="75" text-anchor="middle" class="label">local-first CLI writing system</text>

  <g filter="url(#shadow)">
    <rect x="80" y="132" width="1440" height="112" rx="28" class="card"/>
  </g>
  <rect x="104" y="150" width="180" height="68" rx="20" class="pill"/>
  <rect x="320" y="150" width="248" height="68" rx="20" class="pill"/>
  <rect x="604" y="150" width="180" height="68" rx="20" class="pill"/>
  <rect x="820" y="150" width="316" height="68" rx="20" class="pill-green"/>

  <text x="124" y="619" class="label">DraftChapterWorkflow</text>
  <text x="124" y="667" class="label">ReviewChapterWorkflow</text>
  <text x="124" y="715" class="label">RepairChapterWorkflow</text>
  <text x="124" y="763" class="label">ApproveChapterWorkflow</text>
  <text x="362" y="571" text-anchor="end" class="tiny">两次 retrieval + 落库 plan</text>
  <text x="362" y="619" text-anchor="end" class="tiny">复用 currentPlan.retrieved_context</text>
  <text x="362" y="667" text-anchor="end" class="tiny">结构化审阅 JSON</text>
  <text x="362" y="715" text-anchor="end" class="tiny">基于 plan + draft + review 修稿</text>
  <text x="362" y="763" text-anchor="end" class="tiny">final + diff + sidecar + 回写</text>

  <rect x="560" y="468" width="238" height="28" rx="14" class="accent"/>
  <text x="679" y="488" text-anchor="middle" class="label" fill="#ffffff">Planning / Retrieval / Context</text>
  <text x="560" y="528" class="layer-title">上下文构建层</text>
  <rect x="560" y="550" width="200" height="64" rx="20" class="pill"/>
  <rect x="780" y="550" width="200" height="64" rx="20" class="pill"/>
  <rect x="560" y="632" width="420" height="68" rx="20" class="pill-green"/>
  <rect x="560" y="718" width="200" height="48" rx="18" class="pill"/>
  <rect x="780" y="718" width="200" height="48" rx="18" class="pill-amber"/>

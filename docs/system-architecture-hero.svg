  <rect x="1050" y="706" width="448" height="58" rx="18" class="pill-amber"/>
  <text x="1118" y="580" text-anchor="middle" class="label">env.ts</text>
  <text x="1118" y="598" text-anchor="middle" class="tiny">dotenv + zod</text>
  <text x="1268" y="580" text-anchor="middle" class="label">DatabaseManager</text>
  <text x="1419" y="580" text-anchor="middle" class="label">LlmFactory</text>
  <text x="1419" y="598" text-anchor="middle" class="tiny">mock / openai / anthropic / custom</text>
  <text x="1150" y="653" text-anchor="middle" class="label">ChapterService</text>
  <text x="1150" y="673" text-anchor="middle" class="tiny">章节 CRUD · 版本导入导出 · 指针更新</text>
  <text x="1381" y="653" text-anchor="middle" class="label">Filesystem Adapter</text>
  <text x="1381" y="673" text-anchor="middle" class="tiny">Markdown I/O</text>
  <text x="1274" y="741" text-anchor="middle" class="label">Logger</text>
  <text x="1274" y="760" text-anchor="middle" class="tiny">CRUD / workflow / LLM 耗时与结果</text>

  <g filter="url(#shadow)">
    <rect x="80" y="822" width="670" height="156" rx="28" class="card"/>
    <rect x="780" y="822" width="740" height="156" rx="28" class="card"/>
  </g>

